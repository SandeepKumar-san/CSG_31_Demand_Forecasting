# ============================================================
# Adaptive Temporal-Structural Fusion Model Configuration
# ============================================================
# ALL hyperparameters are now explicit and dataset-specific.
# ZERO hardcoded overrides in the Python code.
# ============================================================

# ---- Global Settings (Shared across all datasets) ----
common:
  dataset: "supplygraph"
  reproducibility:
    seed: 42
    deterministic: true
    num_workers: 0
    cuda_deterministic: true

  output:
    results_dir: "results/"
    plots_dir: "results/plots/"
    risk_reports_dir: "results/risk_reports/"
    checkpoints_dir: "results/checkpoints/"
    logs_dir: "results/logs/"

  model:
    risk_scoring:
      budget_threshold: 100000
      lead_time_safety_factor: 1.5
      criticality_threshold: 0.7

# ---- Dataset-Specific Configurations ----
datasets:
  supplygraph:
    data:
      path: "data/raw/supplygraph/"
      n_products: 40
      n_timepoints: 221
      sequence_length: 30
      forecast_horizons: [1, 3, 6, 12]
      features: ['sales_order', 'production', 'factory_issue', 'delivery', 'operational_mask']
      quantiles: [0.1, 0.5, 0.9]
      train_ratio: 0.7
      val_ratio: 0.15
      test_ratio: 0.15

    model:
      hidden_dim: 128
      tft:
        hidden_dim: 128
        num_layers: 2
        num_heads: 4
        dropout: 0.2
        num_static_features: 2
        num_known_features: 2
      gat:
        hidden_dim: 128
        num_layers: 2
        heads: 4
        dropout: 0.2
        num_node_features: 4
      fusion:
        material_embed_dim: 16
        horizon_embed_dim: 16

    training:
      epochs: 1000
      batch_size: 64
      learning_rate: 0.001
      weight_decay: 0.0001
      gradient_clip: 1.0
      early_stopping_patience: 50
      alpha_reg_weight: 0.1
      quantile_loss_weight: 0.3
      scheduler:
        type: "ReduceLROnPlateau"
        factor: 0.3
        patience: 10
        min_lr: 0.000001

  usgs:
    data:
      path: "data/processed/usgs/"
      raw_path: "data/raw/usgs/"
      enabled: true
      sequence_length: 1
      forecast_horizons: [1]
      rolling_window_cv: true
      n_cv_folds: 2
      features: ['Production', 'Consumption', 'Imports', 'Exports', 'Price',
                 'Stocks', 'Capacity', 'Sales', 'Reserves', 'Supply',
                 'Employment', 'WorldProduction']
      quantiles: [0.1, 0.5, 0.9]
      train_ratio: 0.7
      val_ratio: 0.15
      test_ratio: 0.15

    model:
      hidden_dim: 64
      tft:
        hidden_dim: 64
        num_layers: 2
        num_heads: 4
        dropout: 0.3
        num_static_features: 2
        num_known_features: 2
      gat:
        hidden_dim: 64
        num_layers: 2
        heads: 4
        dropout: 0.3
        num_node_features: 4
      fusion:
        material_embed_dim: 16
        horizon_embed_dim: 16

    training:
      epochs: 1000
      batch_size: 8
      learning_rate: 0.001
      weight_decay: 0.001
      gradient_clip: 1.0
      early_stopping_patience: 50
      alpha_reg_weight: 0.05
      quantile_loss_weight: 0.3
      scheduler:
        type: "ReduceLROnPlateau"
        factor: 0.3
        patience: 10
        min_lr: 0.00001
